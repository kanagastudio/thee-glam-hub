<style>
body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      color: #000000;
      background: linear-gradient(145deg, #f5f5ff, #e6f0ff);
      min-height: 100vh;
      position: relative;
    }

    .gradientBgCanvasHero {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, #ffd9f9 0%, transparent 60%), 
                  radial-gradient(circle at 70% 70%, #d0f0ff 0%, transparent 60%);
      z-index: -1;
      opacity: 0.5;
    }

    .journal-box {
      width: 90%;
      height: 200px;
      padding: 1rem;
      margin: 1rem auto;
      display: block;
      border-radius: 12px;
      border: 1px solid #e4e4e7;
      background-color: #fff5fa;
      font-size: 1rem;
      font-family: "Inter", sans-serif;
      resize: vertical;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .journal-intro {
      text-align: center;
      font-size: 1.1rem;
      margin-top: 1rem;
      color: #c98dae;
    }

    .home-link {
      text-decoration: none;
      display: inline-block;
      margin-top: 1rem;
      font-size: 0.9rem;
      color:#007aff;
    }

    .prompt-box {
      text-align: center;
      margin-top: 2rem;
    }

    #newPromptBtn {
      background-color: #bbcdff;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .save-btn {
      display: block;
      margin: 0 auto;
      margin-top: 0.5rem;
      padding: 0.5rem 1rem;
      background-color: #f7d5fd;
      border: none;
      border-radius: 8px;
      color: #000000;
      font-weight: bold;
      cursor: pointer;
    }

    .save-msg {
      text-align: center;
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #10b981;
    }

    .delete-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      margin-left: 1rem;
      cursor: pointer;
      color: #dc2626;
    }

    .container {
  max-width: 600px;
  margin: 0 auto;
  padding: 2rem 1rem;
}

   .journal-archive,
   .moodboard {
    margin-top: 2rem;
}

     .journal-shadow {
    background-color: #fff7fb;
    padding: 1rem;
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    border: 1px solid #f0e2e9;
  }

  </style>

  <script>
  const prompts = [
    "what made you smile today, even just a little?",
    "what would you tell your younger self right now?",
    "write a love letter to yourself 💌",
    "what’s something you’re proud of recently?",
    "what does life look like for you?",
    "throw ur anger, hate, stress, anything you're feeling here.."
  ];

  const promptText = document.getElementById("journalPrompt");
  const newPromptBtn = document.getElementById("newPromptBtn");
  const journalInput = document.getElementById("journalInput");
  const saveBtn = document.getElementById("saveJournalBtn");
  const journalList = document.getElementById("journalList");
  const saveMsg = document.getElementById("saveMsg");

  // New prompt btn
  newPromptBtn.addEventListener("click", () => {
    const random = prompts[Math.floor(Math.random() * prompts.length)];
    promptText.textContent = random;
  });

  // Load saved entries
  window.addEventListener("DOMContentLoaded", () => {
    const entries = JSON.parse(localStorage.getItem("journalEntries")) || [];
    entries.forEach(entry => addEntryToUI(entry));
  });

  // Save entry
  saveBtn.addEventListener("click", () => {
    const text = journalInput.value.trim();
    if (text !== "") {
      const date = new Date().toLocaleDateString("en-GB", {
        day: "numeric",
        month: "short",
        year: "numeric"
      });

      const entry = { text, date };
      addEntryToUI(entry);
      saveToLocalStorage(entry);
      journalInput.value = "";
      saveMsg.textContent = "✨ saved to your archives";
      setTimeout(() => (saveMsg.textContent = ""), 2000);
    }
  });

  function addEntryToUI(entry) {
    const li = document.createElement("li");
    li.innerHTML = `
      <span>${entry.text}</span><br/>
      <small style="color:#777;font-size:0.8rem;">🕰️ added on ${entry.date}</small>
      <button class="delete-btn" title="Delete">🗑️</button>
    `;
    journalList.appendChild(li);

    li.querySelector(".delete-btn").addEventListener("click", () => {
      li.remove();
      deleteFromLocalStorage(entry);
    });
  }

  function saveToLocalStorage(entry) {
    let entries = JSON.parse(localStorage.getItem("journalEntries")) || [];
    entries.push(entry);
    localStorage.setItem("journalEntries", JSON.stringify(entries));
  }

  function deleteFromLocalStorage(entryToDelete) {
    let entries = JSON.parse(localStorage.getItem("journalEntries")) || [];
    entries = entries.filter(entry => entry.text !== entryToDelete.text || entry.date !== entryToDelete.date);
    localStorage.setItem("journalEntries", JSON.stringify(entries));
  }
</script>
